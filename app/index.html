<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario de Entrenamiento</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
  }
  #calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    max-width: 400px;
  }
  .day {
    padding: 10px;
    border: 1px solid #ccc;
    text-align: center;
    cursor: pointer;
    user-select: none;
  }
  .crossed {
    text-decoration: line-through;
    background-color: #f8d7da;
  }
  .header {
    font-weight: bold;
    background-color: #e2e3e5;
  }
</style>
</head>
<body>
<h1>Calendario de Entrenamiento</h1>
<div id="calendar"></div>
<script>
  // Genera el calendario del mes actual
  const calendarEl = document.getElementById('calendar');
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const dayNames = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
  dayNames.forEach(name => {
    const headerCell = document.createElement('div');
    headerCell.textContent = name;
    headerCell.classList.add('day', 'header');
    calendarEl.appendChild(headerCell);
  });

  for (let i = 0; i < firstDay; i++) {
    const emptyCell = document.createElement('div');
    calendarEl.appendChild(emptyCell);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dayCell = document.createElement('div');
    dayCell.textContent = day;
    dayCell.classList.add('day');
    dayCell.addEventListener('click', () => {
      dayCell.classList.toggle('crossed');
    });
    calendarEl.appendChild(dayCell);
  }
</script>
</body>
</html>
